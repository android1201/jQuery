<html>
    <body>
    <script src="https://code.jquery.com/jquery-3.6.0.js">
    </script>
    <script>
        $(document).ready(() => {
          $(window).load(() => {
              alert('window loaded');
          });
          $(window).unload(() => {
            alert('window unloaded');
          });
          $(window).resize(() => {

              alert('window resized');

          });
          $(window).scroll(() => {

              alert('window scrolled');

          });
        });
    </script>
  </body>
</html>
